name: "Evergreen doc-drift"
description: "Winnow docs against code, post findings, and fail only when a required audit is inconclusive."
branding:
  icon: "book-open"
  color: "green"

inputs:
  anthropic_api_key:
    description: "Anthropic API key for the headless Claude run."
    required: true
  base_ref:
    description: "Diff base. Empty resolves to the PR base (origin/$GITHUB_BASE_REF)."
    required: false
    default: ""
  mode:
    description: "Reserved for future depths; currently always the winnow (deep affirmative) pass."
    required: false
    default: "winnow"
  model:
    description: "Concrete Claude model identifier used for the audit and trusted runtime record."
    required: false
    default: "claude-opus-4-8"
  post_comment:
    description: "Upsert a PR comment with the findings ('true'/'false'). The step summary is always written."
    required: false
    default: "true"
  fail_on_inconclusive:
    description: "Fail the step when Evergreen cannot produce a conclusive validated audit ('true'/'false')."
    required: false
    default: "true"
  repo_path:
    description: "Repository checkout to review. Defaults to the workflow workspace."
    required: false
    default: "."
  pr_number:
    description: "Pull request number for comment publication. Empty falls back to the event ref."
    required: false
    default: ""
  model_timeout_seconds:
    description: "Wall-clock ceiling for the semantic review."
    required: false
    default: "600"
  max_model_output_bytes:
    description: "Maximum Claude stdout accepted by the result protocol."
    required: false
    default: "262144"
  max_budget_usd:
    description: "Maximum provider spend for one semantic review."
    required: false
    default: "5"

runs:
  using: "composite"
  steps:
    - name: Install Claude and run evergreen winnow on the PR
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GITHUB_TOKEN: ${{ github.token }}
        EVERGREEN_BASE_REF: ${{ inputs.base_ref }}
        EVERGREEN_MODE: ${{ inputs.mode }}
        EVERGREEN_MODEL: ${{ inputs.model }}
        EVERGREEN_POST_COMMENT: ${{ inputs.post_comment }}
        EVERGREEN_FAIL_ON_INCONCLUSIVE: ${{ inputs.fail_on_inconclusive }}
        EVERGREEN_REPO_ROOT: ${{ inputs.repo_path }}
        EVERGREEN_PR_NUMBER: ${{ inputs.pr_number }}
        EVERGREEN_MODEL_TIMEOUT_SECONDS: ${{ inputs.model_timeout_seconds }}
        EVERGREEN_MAX_MODEL_OUTPUT_BYTES: ${{ inputs.max_model_output_bytes }}
        EVERGREEN_MAX_BUDGET_USD: ${{ inputs.max_budget_usd }}
        EVERGREEN_IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        # Where SKILL.md and ci/ live, regardless of the consuming repo's checkout.
        EVERGREEN_ACTION_PATH: ${{ github.action_path }}
      run: |
        if ! env -u ANTHROPIC_API_KEY -u GITHUB_TOKEN \
          python3 "$GITHUB_ACTION_PATH/ci/bounded_process.py" \
            --timeout-seconds 180 --max-output-bytes 131072 --clean-env -- \
            npm install -g @anthropic-ai/claude-code@2.1.197; then
          export EVERGREEN_SETUP_ERROR="Claude CLI installation failed."
        fi
        bash "$GITHUB_ACTION_PATH/ci/evergreen-pr.sh"
