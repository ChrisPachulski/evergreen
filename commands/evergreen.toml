description = "Set or report the evergreen freshness-reflex intensity for this repo (off | light | strict)."
prompt = """
Argument given: `{{args}}`.

If an intensity was given (`off`, `light`, or `strict`): record it as this repo's evergreen mode by stating plainly — "set evergreen to {{args}}" — so the mode tracker persists it. It takes effect from the next message.
- off — pause the reflex (same as "stop evergreen").
- light (default) — ladder rungs 1–3 (paths, contracts, snippets) + cite-only prose.
- strict — also run the full rung-4 semantic prose pass.

If no argument was given: read `.evergreen-mode` at the project root (default light if absent) and report the current mode. Do not change it.

For a one-off full audit regardless of mode, use `/evergreen:audit` (always strict).
"""
